<!DOCTYPE html>
<html lang="en">
<head>
    <!-- FIX: Added charset so Filipino characters (ñ, etc.) display correctly -->
    <meta charset="UTF-8">
    <title>ISKA Secure Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-lg border-0" style="width: 400px;">
        <div class="card-header text-center text-white" style="background-color: #800000;">
            <h3 class="mb-0">ISKA Authentication</h3>
        </div>
        <div class="card-body p-4">
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                <div class="alert alert-danger fw-bold text-center">{{ messages[0] }}</div>
              {% endif %}
            {% endwith %}

            <form method="post" autocomplete="off">
                <div class="mb-3">
                    <label class="form-label fw-bold">Username</label>
                    <input type="text" name="username" class="form-control form-control-lg" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold">Password</label>
                    <input type="password" name="password" class="form-control form-control-lg" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Login to Admin Panel</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
